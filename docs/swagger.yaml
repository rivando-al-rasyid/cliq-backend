basePath: /
definitions:
  dto.ChangeAndPasswordRequest:
    properties:
      new_password:
        example: NewP@ssw0rd!
        minLength: 8
        type: string
    required:
    - new_password
    type: object
  dto.ChangePasswordRequest:
    properties:
      old_password:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - old_password
    - password
    type: object
  dto.ConfirmResetPassword:
    properties:
      token:
        example: abc123xyz
        type: string
    required:
    - token
    type: object
  dto.DashboardResponse:
    properties:
      limit:
        type: integer
      links:
        items:
          $ref: '#/definitions/dto.LinkResponse'
        type: array
      page:
        type: integer
      total_active:
        type: integer
      total_clicks:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.Link:
    properties:
      origin_link:
        type: string
      slug:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - origin_link
    type: object
  dto.LinkResponse:
    properties:
      clicks:
        type: integer
      created_at:
        type: string
      id:
        type: string
      origin_link:
        type: string
      short_url:
        type: string
      slug:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: P@ssw0rd123
        type: string
    required:
    - email
    - password
    type: object
  dto.ProfileResponse:
    properties:
      full_name:
        type: string
      phone:
        type: string
      photo:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: P@ssw0rd123
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.ResetPasswordRequest:
    properties:
      email:
        example: user@example.com
        type: string
    required:
    - email
    type: object
  dto.Response:
    properties:
      data: {}
      error:
        type: string
      isSuccess:
        type: boolean
      message:
        type: string
    type: object
  dto.UserInfoResponse:
    properties:
      email:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      photo:
        type: string
    type: object
  dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Backend Cliq  using Gin
  license:
    name: MIT
  title: Cliq
  version: "1.0"
paths:
  /{slug}:
    get:
      description: Redirects to the original URL for the provided short link slug.
      parameters:
      - description: Short link slug
        in: path
        name: slug
        required: true
        type: string
      responses:
        "301":
          description: Redirects to original URL
          schema:
            type: string
        "404":
          description: Slug not found
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Redirect by slug
      tags:
      - Links
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Replaces the user's password. Requires the short-lived JWT returned
        by POST /auth/reset/confirm as a Bearer token.
      parameters:
      - description: New password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChangeAndPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Change password after reset confirmation
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verifies email and password, stores the access JWT in an HttpOnly
        cookie, and returns public user data.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HttpOnly access token cookie
              type: string
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Login user
      tags:
      - Authentication
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the current access token and clears the HttpOnly access
        cookie.
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          headers:
            Set-Cookie:
              description: Cleared access token cookie
              type: string
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Authentication
  /auth/me:
    get:
      consumes:
      - application/json
      description: Returns the active user identity from the verified access cookie
        or Bearer token.
      produces:
      - application/json
      responses:
        "200":
          description: Authenticated user retrieved
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Get current authenticated user
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and its default profile.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User successfully registered
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Register a new user
      tags:
      - Authentication
  /auth/reset:
    post:
      consumes:
      - application/json
      description: Looks up the account by email and stores a short-lived PASSWORD_RESET
        token. Deliver this token to the user via email or SMS, then exchange it at
        POST /auth/reset/confirm.
      parameters:
      - description: Registered email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Reset token generated
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: Account not found
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Request password reset token
      tags:
      - Authentication
  /auth/reset/confirm:
    post:
      consumes:
      - application/json
      description: Validates the opaque PASSWORD_RESET token issued by POST /auth/reset,
        revokes it for single use, and returns a short-lived password-reset JWT.
      parameters:
      - description: Reset token payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ConfirmResetPassword'
      produces:
      - application/json
      responses:
        "200":
          description: Reset token confirmed
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid request payload
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Invalid or expired reset token
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      summary: Confirm password reset token
      tags:
      - Authentication
  /link/{id}:
    delete:
      consumes:
      - application/json
      description: Soft deletes a short link owned by the authenticated user.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Link deleted successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid link id
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: Link not found
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Delete short link
      tags:
      - Links
  /link/create:
    post:
      consumes:
      - application/json
      description: Creates a short link for the authenticated user. If the slug is
        empty, the service generates a random unique slug.
      parameters:
      - description: Short link payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.Link'
      produces:
      - application/json
      responses:
        "201":
          description: Short link created successfully
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid origin link, slug, or reserved slug
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "409":
          description: Slug already exists
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Create short link
      tags:
      - Links
  /link/dashboard:
    get:
      consumes:
      - application/json
      description: Returns dashboard totals and paginated active links for the authenticated
        user.
      parameters:
      - default: 1
        description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard successfully retrieved
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.DashboardResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Get link dashboard
      tags:
      - Links
  /profile:
    get:
      consumes:
      - application/json
      description: Retrieves the current user's profile, including full name, phone
        number, and photo URL.
      produces:
      - application/json
      responses:
        "200":
          description: Profile successfully retrieved
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ProfileResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "404":
          description: Profile not found
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Get profile
      tags:
      - Profile
  /profile/edit:
    patch:
      consumes:
      - multipart/form-data
      description: Updates the current user's profile. Accepts optional full_name,
        phone, and photo multipart fields.
      parameters:
      - description: Full name
        in: formData
        name: full_name
        type: string
      - description: Phone number
        in: formData
        name: phone
        type: string
      - description: Profile photo file (.jpg, .jpeg, .png, .webp, max 2MB)
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Profile successfully updated
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "422":
          description: Invalid file type or file too large
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Update profile
      tags:
      - Profile
  /profile/info:
    get:
      consumes:
      - application/json
      description: Returns the authenticated user's account identity and profile summary.
      produces:
      - application/json
      responses:
        "200":
          description: User info successfully retrieved
          schema:
            allOf:
            - $ref: '#/definitions/dto.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserInfoResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Get user info
      tags:
      - Profile
  /profile/password:
    patch:
      consumes:
      - application/json
      description: Changes the current user's password after validating the old password.
      parameters:
      - description: Password change payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password successfully updated
          schema:
            $ref: '#/definitions/dto.Response'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/dto.Response'
        "401":
          description: Unauthorized or old password is incorrect
          schema:
            $ref: '#/definitions/dto.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.Response'
      security:
      - BearerAuth: []
      summary: Update profile password
      tags:
      - Profile
securityDefinitions:
  BearerAuth:
    description: 'Type "Bearer" followed by a space and your JWT. Example: "Bearer
      eyJhbGci..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
