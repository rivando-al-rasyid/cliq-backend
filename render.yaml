version: "1"

projects:
  - name: cliq
    environments:
      - name: Production

        services:
          - type: web
            name: cliq-backend
            runtime: image
            image:
              url: ghcr.io/rivando-al-rasyid/cliq-backend:latest
            plan: free
            region: singapore
            autoDeployTrigger: commit
            envVars:
              - key: PORT
                value: 8080
              - key: APP_ENV
                value: production
              - key: DATABASE_URL
                fromDatabase:
                  name: cliq-postgres
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: cliq-redis
                  property: connectionString
              - key: JWT_ISSUER
                value: cliq
              - key: JWT_SECRET
                sync: false
              - key: ALLOWED_ORIGIN
                value: https://cliq-frontend-six.vercel.app

          - type: keyvalue
            name: cliq-redis
            plan: free
            region: singapore
            maxmemoryPolicy: allkeys-lru
            ipAllowList: []

        databases:
          - name: cliq-postgres
            databaseName: cliq
            user: cliq_user
            plan: free
            region: singapore
